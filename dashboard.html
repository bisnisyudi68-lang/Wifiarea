<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Konter</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
}

header{
  background:#0d6efd;
  color:white;
  text-align:center;
  padding:20px;
}

.tabs{
  display:flex;
  gap:5px;
  padding:10px;
}

.tabs button{
  flex:1;
  border:none;
  padding:12px;
  border-radius:8px;
  background:white;
  color:#0d6efd;
  font-size:16px;
  font-weight:bold;
}

.tabs button.active{
  background:#0d6efd;
  color:white;
}

.box{
  display:none;
  background:white;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

.box.active{
  display:block;
}

.item{
  padding:12px 0;
  border-bottom:1px solid #ddd;
}

.tanggal{
  font-size:14px;
  color:#666;
}

.total{
  font-size:20px;
  font-weight:bold;
}

</style>
</head>

<body>

<header>
  <h2>📊 Dashboard Konter</h2>
  <small>Data dari Sheet DATA</small>
</header>

<div class="tabs">

  <button
    class="active"
    id="btnHarian"
    onclick="showTab('harian')">

    Harian

  </button>

  <button
    id="btnBulanan"
    onclick="showTab('bulanan')">

    Bulanan

  </button>

  <button
    id="btnTahunan"
    onclick="showTab('tahunan')">

    Tahunan

  </button>

</div>

<div id="harian" class="box active">

  <h3>📅 Data Harian</h3>

  <div id="harianList">
    Loading...
  </div>

</div>

<div id="bulanan" class="box">

  <h3>🗓️ Data Bulanan</h3>

  <div id="bulananList">
    Loading...
  </div>

</div>

<div id="tahunan" class="box">

  <h3>📆 Data Tahunan</h3>

  <div id="tahunanList">
    Loading...
  </div>

</div>

<script>

function showTab(id){

  document
    .querySelectorAll(".box")
    .forEach(el => el.classList.remove("active"));

  document
    .querySelectorAll(".tabs button")
    .forEach(el => el.classList.remove("active"));

  document
    .getElementById(id)
    .classList.add("active");

  document
    .getElementById(
      "btn" +
      id.charAt(0).toUpperCase() +
      id.slice(1)
    )
    .classList.add("active");
}

/* =========================
   CSV FIX RUMUS1
========================= */

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTAP_R50frV13whqx54ctjplc-8xhcN53rHEVk5mkhLeZE283xWnr6TdTBFr-KFymEiaYE_NWgGthpo/pub?output=csv";

fetch(CSV_URL)

.then(res => res.text())

.then(csv => {

  const rows =
    csv.trim().split("\n").slice(1);

  let harian = {};
  let bulanan = {};
  let tahunan = {};

  rows.forEach(row => {

    const c =
      row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

    if(!c) return;

    /* =========================
       FIX RUMUS1
    ========================= */

    const tanggal =
      (c[0] || "")
      .replace(/"/g,"")
      .trim();

    const bulan =
      (c[2] || "")
      .replace(/"/g,"")
      .trim();

    const tahun =
      (c[3] || "")
      .replace(/"/g,"")
      .trim();

    /* =========================
       TOTAL HARGA = KOLOM L
       INDEX 11
    ========================= */

    const totalText =
      (c[11] || "")
      .replace(/"/g,"")
      .replace(/\./g,"")
      .replace(/[^\d]/g,"");

    const total =
      parseInt(totalText) || 0;

    /* LEWATI DATA ERROR */

    if(
      tanggal.includes("#REF!")
      ||
      bulan.includes("#REF!")
      ||
      tahun.includes("#REF!")
      ||
      total <= 0
    ){
      return;
    }

    /* =========================
       HARIAN
    ========================= */

    if(!harian[tanggal]){
      harian[tanggal] = 0;
    }

    harian[tanggal] += total;

    /* =========================
       BULANAN
    ========================= */

    const namaBulan =
      bulan + " " + tahun;

    if(!bulanan[namaBulan]){
      bulanan[namaBulan] = 0;
    }

    bulanan[namaBulan] += total;

    /* =========================
       TAHUNAN
    ========================= */

    if(!tahunan[tahun]){
      tahunan[tahun] = 0;
    }

    tahunan[tahun] += total;

  });

  /* =========================
     HARIAN
  ========================= */

  let hHtml = "";

  Object.keys(harian)

  .forEach(tgl => {

    hHtml += `

    <div class="item">

      <div class="tanggal">
        ${tgl}
      </div>

      <div class="total">
        Rp ${harian[tgl].toLocaleString("id-ID")}
      </div>

    </div>

    `;
  });

  document
    .getElementById("harianList")
    .innerHTML =
      hHtml || "Tidak ada data";

  /* =========================
     BULANAN
  ========================= */

  let bHtml = "";

  Object.keys(bulanan)

  .forEach(bln => {

    bHtml += `

    <div class="item">

      <div class="tanggal">
        ${bln}
      </div>

      <div class="total">
        Rp ${bulanan[bln].toLocaleString("id-ID")}
      </div>

    </div>

    `;
  });

  document
    .getElementById("bulananList")
    .innerHTML =
      bHtml || "Tidak ada data";

  /* =========================
     TAHUNAN
  ========================= */

  let tHtml = "";

  Object.keys(tahunan)

  .forEach(thn => {

    tHtml += `

    <div class="item">

      <div class="tanggal">
        ${thn}
      </div>

      <div class="total">
        Rp ${tahunan[thn].toLocaleString("id-ID")}
      </div>

    </div>

    `;
  });

  document
    .getElementById("tahunanList")
    .innerHTML =
      tHtml || "Tidak ada data";

})

.catch(error => {

  console.log(error);

  alert("Gagal mengambil data");

});

</script>

</body>
</html>
