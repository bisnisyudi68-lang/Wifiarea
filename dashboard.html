<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Konter</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
}

header{
  background:#0d6efd;
  color:white;
  text-align:center;
  padding:20px;
}

.tabs{
  display:flex;
  gap:5px;
  padding:10px;
}

.tabs button{
  flex:1;
  border:none;
  padding:12px;
  border-radius:10px;
  background:white;
  color:#0d6efd;
  font-size:16px;
  font-weight:bold;
}

.tabs button.active{
  background:#0d6efd;
  color:white;
}

.box{
  display:none;
  background:white;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

.box.active{
  display:block;
}

.item{
  padding:12px 0;
  border-bottom:1px solid #ddd;
}

.judul{
  font-size:15px;
  color:#666;
}

.total{
  font-size:28px;
  font-weight:bold;
  margin-top:5px;
}

</style>
</head>

<body>

<header>
  <h2>📊 Dashboard Konter</h2>
  <small>Data dari Sheet FIX RUMUS1</small>
</header>

<div class="tabs">

  <button
    class="active"
    id="btnHarian"
    onclick="showTab('harian')">

    Harian

  </button>

  <button
    id="btnBulanan"
    onclick="showTab('bulanan')">

    Bulanan

  </button>

  <button
    id="btnTahunan"
    onclick="showTab('tahunan')">

    Tahunan

  </button>

</div>

<div id="harian" class="box active">

  <h3>📅 Data Harian</h3>

  <div id="harianList">
    Loading...
  </div>

</div>

<div id="bulanan" class="box">

  <h3>🗓️ Data Bulanan</h3>

  <div id="bulananList">
    Loading...
  </div>

</div>

<div id="tahunan" class="box">

  <h3>📆 Data Tahunan</h3>

  <div id="tahunanList">
    Loading...
  </div>

</div>

<script>

/* =========================
   TAB
========================= */

function showTab(id){

  document
    .querySelectorAll(".box")
    .forEach(box=>{
      box.classList.remove("active");
    });

  document
    .querySelectorAll(".tabs button")
    .forEach(btn=>{
      btn.classList.remove("active");
    });

  document
    .getElementById(id)
    .classList.add("active");

  document
    .getElementById(
      "btn" +
      id.charAt(0).toUpperCase() +
      id.slice(1)
    )
    .classList.add("active");
}

/* =========================
   LINK CSV
========================= */

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTAP_R50frV13whqx54ctjplc-8xhcN53rHEVk5mkhLeZE283xWnr6TdTBFr-KFymEiaYE_NWgGthpo/pub?gid=1848020631&single=true&output=csv";

/* =========================
   FETCH DATA
========================= */

fetch(CSV_URL)

.then(res=>res.text())

.then(csv=>{

  const rows =
    csv.trim().split("\n").slice(1);

  let harian = {};
  let bulanan = {};
  let tahunan = {};

  rows.forEach(row=>{

    const c =
      row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

    if(!c) return;

    /* =========================
       KOLOM
    ========================= */

    const tanggal =
      (c[0] || "")
      .replace(/"/g,"")
      .trim();

    const bulan =
      (c[2] || "")
      .replace(/"/g,"")
      .trim();

    const tahun =
      (c[3] || "")
      .replace(/"/g,"")
      .trim();

    const totalText =
      (c[11] || "")
      .replace(/"/g,"")
      .replace(/\./g,"")
      .replace(/,/g,"")
      .trim();

    const total =
      parseInt(totalText) || 0;

    if(
      !tanggal ||
      !bulan ||
      !tahun ||
      total <= 0
    ){
      return;
    }

    /* =========================
       FORMAT TANGGAL
    ========================= */

    const parts =
      tanggal.split("/");

    if(parts.length < 3){
      return;
    }

    const urutTanggal =
      new Date(
        parts[2],
        parts[1]-1,
        parts[0]
      );

    /* =========================
       HARIAN
    ========================= */

    if(!harian[tanggal]){

      harian[tanggal] = {
        total:0,
        urut:urutTanggal
      };

    }

    harian[tanggal].total += total;

    /* =========================
       BULANAN
    ========================= */

    const namaBulan =
      bulan + " " + tahun;

    if(!bulanan[namaBulan]){

      bulanan[namaBulan] = {
        total:0,
        urut:urutTanggal
      };

    }

    bulanan[namaBulan].total += total;

    /* =========================
       TAHUNAN
    ========================= */

    if(!tahunan[tahun]){
      tahunan[tahun] = 0;
    }

    tahunan[tahun] += total;

  });

  /* =========================
     TAMPILKAN HARIAN
  ========================= */

  let hHtml = "";

  Object.keys(harian)

  .sort((a,b)=>{
    return harian[a].urut - harian[b].urut;
  })

  .forEach(tgl=>{

    hHtml += `

      <div class="item">

        <div class="judul">
          ${tgl}
        </div>

        <div class="total">
          Rp ${harian[tgl].total.toLocaleString("id-ID")}
        </div>

      </div>

    `;

  });

  document
    .getElementById("harianList")
    .innerHTML =
      hHtml || "Tidak ada data";

  /* =========================
     TAMPILKAN BULANAN
  ========================= */

  let bHtml = "";

  Object.keys(bulanan)

  .sort((a,b)=>{
    return bulanan[a].urut - bulanan[b].urut;
  })

  .forEach(bln=>{

    bHtml += `

      <div class="item">

        <div class="judul">
          ${bln}
        </div>

        <div class="total">
          Rp ${bulanan[bln].total.toLocaleString("id-ID")}
        </div>

      </div>

    `;

  });

  document
    .getElementById("bulananList")
    .innerHTML =
      bHtml || "Tidak ada data";

  /* =========================
     TAMPILKAN TAHUNAN
  ========================= */

  let tHtml = "";

  Object.keys(tahunan)

  .forEach(thn=>{

    tHtml += `

      <div class="item">

        <div class="judul">
          ${thn}
        </div>

        <div class="total">
          Rp ${tahunan[thn].toLocaleString("id-ID")}
        </div>

      </div>

    `;

  });

  document
    .getElementById("tahunanList")
    .innerHTML =
      tHtml || "Tidak ada data";

})

.catch(error=>{

  console.log(error);

  alert("Gagal mengambil data");

});

</script>

</body>
</html>
