<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voucher WiFi Majalengka</title>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
header { background:#0d6efd; color:white; padding:15px; text-align:center; }
.container { padding:20px; }
.card { background:white; padding:15px; margin-bottom:10px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); cursor:pointer; }
button { background:#25D366; color:white; border:none; padding:10px; border-radius:5px; margin-top:5px; width:100%; }
.back { background:#6c757d; margin-bottom:10px; }
</style>
</head>
<body>

<header>
<h2>Voucher WiFi Majalengka</h2>
<p>Pilih Kecamatan → Desa → Paket</p>
<p>Pembayaran DANA: 082319264646</p>
</header>

<div class="container">
<div id="content"></div>
</div>

<script>

const data = {
  "Maja": ["Maja Utara","Maja Selatan","Cieurih","Cipasung","Salagedang"],
  "Kadipaten": ["Kadipaten","Heuleut","Pagandon","Cipaku"],
  "Jatiwangi": ["Jatiwangi","Burujul","Sutawangi","Andir"],
  "Majalengka": ["Cigasong","Tarikolot","Babakan Jawa","Munjul"],
  "Cigasong": ["Cigasong","Kawunghilir","Tenjolayar"],
  "Sukahaji": ["Sukahaji","Cikoneng","Padahanten"],
  "Rajagaluh": ["Rajagaluh","Leuwilaja","Sindang"],
  "Sindangwangi": ["Sindangwangi","Lengkong","Padaherang"],
  "Leuwimunding": ["Leuwimunding","Karayunan"],
  "Palasah": ["Palasah","Weragati"],
  "Sumberjaya": ["Sumberjaya","Paningkiran","Banjaran"],
  "Ligung": ["Ligung","Buntu","Ciborelang"],
  "Jatitujuh": ["Jatitujuh","Babakan","Sumberkulon"],
  "Kertajati": ["Kertajati","Kertasari","Sukamulya"],
  "Dawuan": ["Dawuan","Mandapa"],
  "Kasokandel": ["Kasokandel","Gunungsari"],
  "Panyingkiran": ["Panyingkiran","Pasirayu"],
  "Argapura": ["Argapura","Cibunut"],
  "Malausma": ["Malausma","Cipaku"],
  "Bantarujeg": ["Bantarujeg","Cinambo"],
  "Lemahsugih": ["Lemahsugih","Margajaya"],
  "Talaga": ["Talaga","Campaga","Argasari"],
  "Banjaran": ["Banjaran","Cimeong"],
  "Cingambul": ["Cingambul","Cikijing"],
  "Cikijing": ["Cikijing","Bagjasari"],
  "Cibitung": ["Cibitung","Cidadap"]
};

const harga = [
  {nama:"2 Jam", harga:"Rp2.000"},
  {nama:"12 Jam", harga:"Rp5.000"},
  {nama:"24 Jam", harga:"Rp7.000"}
];

const content = document.getElementById("content");

// tampil kecamatan awal
function showKecamatan() {
  content.innerHTML = "";
  for (let kec in data) {
    let el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `<h3>${kec}</h3>`;
    el.onclick = () => showDesa(kec);
    content.appendChild(el);
  }
}

// tampil desa
function showDesa(kec) {
  content.innerHTML = `<button class='back' onclick='showKecamatan()'>← Kembali</button>`;

  data[kec].forEach(desa => {
    let el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `<h4>${desa}</h4>`;
    el.onclick = () => showPaket(desa);
    content.appendChild(el);
  });
}

// tampil paket
function showPaket(desa) {
  content.innerHTML = `<button class='back' onclick='showKecamatan()'>← Kembali</button>`;

  harga.forEach(p => {
    let el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `
      <p><b>${desa}</b></p>
      <p>${p.nama} - ${p.harga}</p>
      <button onclick="order('${desa}','${p.nama}')">Beli</button>
    `;
    content.appendChild(el);
  });
}

function order(lokasi, paket) {
  let nomor = '6282319264646';
  let pesan = `Halo, saya mau beli voucher WiFi\nLokasi: ${lokasi}\nPaket: ${paket}\nPembayaran ke DANA: 082319264646`;
  let url = `https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`;
  window.open(url, '_blank');
}

// start
showKecamatan();

</script>

</body>
</html>
