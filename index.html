<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voucher WiFi Majalengka</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; margin:0; }
    header { background:#0d6efd; color:white; padding:15px; text-align:center; }
    .container { padding:20px; }
    .card {
      background:white; padding:15px; margin-bottom:15px;
      border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);
      cursor:pointer;
    }
    .hidden { display:none; }
    button {
      background:#25D366; color:white; border:none;
      padding:10px 15px; border-radius:5px; cursor:pointer;
      margin-top:10px;
    }
  </style>
</head>
<body>

<header>
  <h2>Voucher WiFi Majalengka</h2>
  <p>Pilih Kecamatan → Desa → Paket</p>
  <p>Pembayaran via DANA: 082319264646</p>
</header>

<div class="container">

  <!-- KECAMATAN -->
  <div class="card" onclick="showDesa('maja')">
    <h3>Kecamatan Maja</h3>
  </div>

  <!-- DESA -->
  <div id="maja" class="hidden">

    <div class="card" onclick="showPaket('maja1')">
      <h4>Desa Maja Utara</h4>
    </div>

    <div id="maja1" class="hidden">
      <p>2 Jam - Rp2.000</p>
      <button onclick="order('Maja Utara','2 Jam')">Beli</button>

      <p>1 Hari - Rp5.000</p>
      <button onclick="order('Maja Utara','1 Hari')">Beli</button>
    </div>

    <div class="card" onclick="showPaket('maja2')">
      <h4>Desa Maja Selatan</h4>
    </div>

    <div id="maja2" class="hidden">
      <p>2 Jam - Rp2.000</p>
      <button onclick="order('Maja Selatan','2 Jam')">Beli</button>

      <p>1 Hari - Rp5.000</p>
      <button onclick="order('Maja Selatan','1 Hari')">Beli</button>
    </div>

  </div>

</div>

<script>
function showDesa(id) {
  let el = document.getElementById(id);
  el.classList.toggle('hidden');
}

function showPaket(id) {
  let el = document.getElementById(id);
  el.classList.toggle('hidden');
}

function order(lokasi, paket) {
  let nomor = '6282319264646'; // Nomor WA & DANA
  let pesan = `Halo, saya mau beli voucher WiFi\nLokasi: ${lokasi}\nPaket: ${paket}`;
  let url = `https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`;
  window.open(url, '_blank');
}
</script>

</body>
</html>
